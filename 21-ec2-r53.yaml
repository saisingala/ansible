- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    instance:
    - mysql
    - backend
    - frontend
  tasks:
  - name: create ec2 instance
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      vpc_subnet_id: subnet-05ab30fcf1a1ff260
      instance_type: t3.micro
      security_group: sg-0efcd8315a973a0e8
      image_id: ami-0220d79f3f480ecf5
    loop: "{{ instance }}"
    register: ec2_instance