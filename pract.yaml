- name: ping the server
  hosts: web
  tasks:
  - name: ping information
    ansible.builtin.ping:


- name: variable to be print
  hosts: web
  vars:
    COURSE: DevOps
  tasks:
    - name: print the course information
      ansible.builtin.debug:
        msg: "I am learning {{COURSE}}"
    - name: print the course ingo again 
      vars:
        COURSE: ansible
      ansible.builtin.debug:
        msg: "I am learning {{COURSE}}"

- name: variable to be print
  hosts: web     
  vars_files:
  - vars.yaml
  tasks:
  - name: print the course information
    ansible.builtin.debug:
      msg: "I am learning {{COURSE}}"

- name: variable to be print
  hosts: web     
  vars_prompt:
  - name: COURSE
    prompt: please enter course name 
    private: true
  tasks:
  - name: print the course information
    ansible.builtin.debug:
      msg: "I am learning {{COURSE}}"

