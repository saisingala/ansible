- name: create user
  hosts: web
  become: yes
  tasks:
  - name: check user exists or not
    ansible.builtin.command: id expense
    register: USER #in USER variable that gets output from above command
    ignore_errors: True
  - name: print user information
    ansible.builtin.debug:
      msg: " User info {{ USER }} "
  
  - name: creating user
    ansible.builtin.command: useradd expense
    when: USER.rc != 0

