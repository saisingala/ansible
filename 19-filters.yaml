- name: Demo on functions
  hosts: local
  connection: local
  tasks:
  - name: print the default value
    ansible.builtin.debug:
      msg: "Hello {{ course | default ('ansible') }}"

  - name: convert to uppercase
    vars:
      str: Hi Ramesh
    ansible.builtin.debug:
      msg: "{{ str | upper }}"

  - name: convert to lowercase
    vars:
      str: Hi Ramesh
    ansible.builtin.debug:
      msg: "{{ str | lower }}"    

  - name: Unique numbers
    vars:
      num: [ 1 3 3 5 3 7 5 8 5 6 ]
    ansible.builtin.debug:
      msg: "{{ num | unique }}" 