- name: print the conditional satements
  hosts: local
  connection: local
  vars_prompt:
    - name: num
      prompt: print the Number
      private: false 
  tasks:
  - name: print the number if less than 10
    ansible.builtin.debug:
     msg: "{{ num }} is less than 10"
    when: num < 10
  - name: print the number if greater than 10
    ansible.builtin.debug:
     msg: "{{ num }} is greater than or equals to 10"
    when: num >= 10
