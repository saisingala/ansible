- name: print loops
  hosts: local
  connection: local
  become: yes
  tasks: 
  - name: install package
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop:
    - { name: 'mysql', state: 'present' }
    - { name: 'postfix', state: 'present' }
    - { name: 'httpd', state: 'absent' }